<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation Demo</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #0c1017;
      color: #d7e0f4;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }
    .panel {
      border: 1px solid #263146;
      border-radius: 10px;
      background: #111826;
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 12px;
    }
    .layout.is-sidebar-collapsed {
      grid-template-columns: 112px 1fr;
    }
    .layout-sidebar-panel {
      transition: width 180ms ease, padding 180ms ease;
    }
    .back {
      color: #b2c2e5;
      text-decoration: none;
      font-size: 13px;
    }
    .log {
      margin: 0;
      white-space: pre-wrap;
      font-size: 12px;
      color: #b2c2e5;
      font-family: Consolas, "Courier New", monospace;
      border: 1px solid #2b3750;
      border-radius: 8px;
      background: #0b1220;
      padding: 10px;
      height: 220px;
      overflow-y: auto;
      overflow-x: auto;
    }
  </style>
  <script type="module">
    import { uiLoader } from "./js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["ui.navbar", "ui.sidebar", "ui.breadcrumbs", "ui.dropdown", "ui.dropup"]);
  </script>
</head>
<body>
  <main class="page" data-theme="dark">
    <section class="panel">
      <div class="row">
        <a class="back" href="./index.html">← Back to Home</a>
        <button id="themeToggle" class="ui-button" type="button">Toggle Theme</button>
      </div>
      <h1 class="ui-title">Navigation Demo</h1>
      <p>Navbar, Sidebar, Breadcrumbs, Dropdown, Dropup</p>
    </section>

    <section class="panel">
      <div id="navbarHost"></div>
    </section>

    <section id="navLayout" class="layout">
      <article id="sidebarPanel" class="panel layout-sidebar-panel">
        <div id="sidebarHost"></div>
      </article>
      <article class="panel">
        <div id="breadcrumbsHost"></div>
        <div class="row">
          <input id="crumbInput" class="ui-input" type="text" placeholder="New breadcrumb label">
          <button id="crumbAddBtn" class="ui-button" type="button">Add Crumb</button>
          <button id="crumbResetBtn" class="ui-button" type="button">Reset</button>
        </div>
        <div class="row">
          <button id="dropdownBtn" class="ui-button" type="button">Open Dropdown</button>
          <button id="dropupBtn" class="ui-button" type="button">Open Dropup</button>
        </div>
      </article>
    </section>

    <section class="panel">
      <h2 class="ui-title">Event Log</h2>
      <pre id="log" class="log">No events yet.</pre>
    </section>
  </main>

  <script type="module">
    import { uiLoader } from "./js/ui/ui.loader.js";
    await window.__demoLoaderReady;
    const { createNavbar } = await uiLoader.import("ui.navbar");
    const { createSidebar } = await uiLoader.import("ui.sidebar");
    const { createBreadcrumbs } = await uiLoader.import("ui.breadcrumbs");
    const { createDropdown } = await uiLoader.import("ui.dropdown");
    const { createDropup } = await uiLoader.import("ui.dropup");

    const page = document.querySelector("main.page");
    const log = document.getElementById("log");
    const crumbInput = document.getElementById("crumbInput");
    const crumbAddBtn = document.getElementById("crumbAddBtn");
    const crumbResetBtn = document.getElementById("crumbResetBtn");
    const navLayout = document.getElementById("navLayout");
    function writeLog(label, payload) {
      const line = `[${new Date().toISOString()}] ${label}\n${JSON.stringify(payload ?? {}, null, 2)}\n`;
      log.textContent = log.textContent === "No events yet." ? line : `${line}\n${log.textContent}`;
    }

    document.getElementById("themeToggle").addEventListener("click", () => {
      page.dataset.theme = page.dataset.theme === "dark" ? "light" : "dark";
      writeLog("theme.toggle", { theme: page.dataset.theme });
    });

    createNavbar(document.getElementById("navbarHost"), {}, {
      brandText: "Hotline UI",
      activeId: "incidents",
      sticky: true,
      iconPosition: "start",
      items: [
        { id: "dashboard", label: "Dashboard", icon: '<svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10Zm0 8h8v-6H3v6Zm10 0h8V11h-8v10Zm0-18v6h8V3h-8Z"/></svg>' },
        { id: "incidents", label: "Incidents", icon: '<svg viewBox="0 0 24 24"><path d="M12 2 1 21h22L12 2Zm1 14h-2v2h2v-2Zm0-6h-2v5h2V10Z"/></svg>' },
        { id: "reports", label: "Reports", icon: '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16l4-3 4 3 4-3 4 3V8l-6-6Z"/></svg>' },
      ],
      actions: [
        { id: "help", label: "Help", icon: '<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm1 17h-2v-2h2v2Zm2.1-7.8-.9.9c-.7.7-1.2 1.4-1.2 2.9h-2v-.5c0-1.1.4-2.2 1.2-3l1.2-1.2a2 2 0 1 0-3.4-1.4H8a4 4 0 1 1 7.1 2.3Z"/></svg>' },
        {
          id: "profile",
          label: "Profile",
          icon: '<svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.4 0-8 2-8 4.5V21h16v-2.5C20 16 16.4 14 12 14Z"/></svg>',
          menuOptions: { align: "right" },
          menuItems: [
            { id: "manage", label: "Manage" },
            { id: "clear-cache", label: "Clear Cache" },
            { id: "logout", label: "Logout", danger: true },
          ],
        },
      ],
      onNavigate(item) {
        writeLog("navbar.navigate", item);
      },
      onAction(action) {
        writeLog("navbar.action", action);
      },
      onActionMenuSelect(action, item) {
        writeLog("navbar.action.menu.select", { action, item });
      },
      onActionMenuOpenChange(action, open) {
        writeLog("navbar.action.menu.open", { action, open });
      },
    });

    createSidebar(document.getElementById("sidebarHost"), {}, {
      title: "Sections",
      activeId: "calls",
      items: [
        { id: "calls", label: "Calls", icon: '<svg viewBox="0 0 24 24"><path d="M6.6 10.8a15.1 15.1 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.2c1.1.4 2.2.6 3.4.6a1 1 0 0 1 1 1V21a1 1 0 0 1-1 1A18 18 0 0 1 2 4a1 1 0 0 1 1-1h3.4a1 1 0 0 1 1 1c0 1.2.2 2.3.6 3.4a1 1 0 0 1-.2 1l-2.2 2.4Z"/></svg>' },
        { id: "dispatch", label: "Dispatch", icon: '<svg viewBox="0 0 24 24"><path d="M12 2 4 5v6c0 5 3.4 9.7 8 11 4.6-1.3 8-6 8-11V5l-8-3Zm0 9h6a8.7 8.7 0 0 1-6 8.3V11Z"/></svg>' },
        { id: "teams", label: "Teams", icon: '<svg viewBox="0 0 24 24"><path d="M16 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm-8 1a3 3 0 1 0-3-3 3 3 0 0 0 3 3Zm0 2c-2.3 0-7 1.2-7 3.5V20h14v-2.5c0-2.3-4.7-3.5-7-3.5Zm8 0c-.3 0-.7 0-1.1.1 1.2.9 2.1 2.1 2.1 3.4V20H23v-2.5c0-2.3-4.7-3.5-7-3.5Z"/></svg>' },
        { id: "settings", label: "Settings", icon: '<svg viewBox="0 0 24 24"><path d="M19.4 12.9a7.7 7.7 0 0 0 .1-.9 7.7 7.7 0 0 0-.1-.9l2.1-1.6a.5.5 0 0 0 .1-.7l-2-3.5a.5.5 0 0 0-.6-.2l-2.5 1a7.4 7.4 0 0 0-1.5-.9l-.4-2.7a.5.5 0 0 0-.5-.4h-4a.5.5 0 0 0-.5.4l-.4 2.7c-.5.2-1 .5-1.5.9l-2.5-1a.5.5 0 0 0-.6.2l-2 3.5a.5.5 0 0 0 .1.7l2.1 1.6a7.7 7.7 0 0 0-.1.9c0 .3 0 .6.1.9l-2.1 1.6a.5.5 0 0 0-.1.7l2 3.5a.5.5 0 0 0 .6.2l2.5-1c.5.4 1 .7 1.5.9l.4 2.7a.5.5 0 0 0 .5.4h4a.5.5 0 0 0 .5-.4l.4-2.7c.5-.2 1-.5 1.5-.9l2.5 1a.5.5 0 0 0 .6-.2l2-3.5a.5.5 0 0 0-.1-.7l-2.1-1.6ZM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Z"/></svg>' },
      ],
      onNavigate(item) {
        writeLog("sidebar.navigate", item);
      },
      onToggleCollapsed(next) {
        navLayout?.classList.toggle("is-sidebar-collapsed", Boolean(next));
        writeLog("sidebar.collapse", { collapsed: next });
      },
    });

    const breadcrumbsApi = createBreadcrumbs(document.getElementById("breadcrumbsHost"), {}, {
      autoTruncateOnNavigate: true,
    });
    const baseCrumbs = [
      { id: "home", label: "Home", icon: '<svg viewBox="0 0 24 24"><path d="M12 3 2 12h3v9h6v-6h2v6h6v-9h3L12 3Z"/></svg>' },
      { id: "incidents", label: "Incidents", icon: '<svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v14l4-3h12a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2Z"/></svg>' },
      { id: "details", label: "Details", icon: '<svg viewBox="0 0 24 24"><path d="M11 7h2v2h-2V7Zm0 4h2v6h-2v-6Zm1-9a10 10 0 1 0 10 10A10 10 0 0 0 12 2Z"/></svg>' },
    ];
    breadcrumbsApi.setItems(baseCrumbs);
    breadcrumbsApi.update({}, {
      onNavigate(item, index, nextItems) {
        writeLog("breadcrumbs.navigate", {
          item,
          index,
          remaining: nextItems.map((crumb) => crumb.label),
        });
      },
    });

    crumbAddBtn.addEventListener("click", () => {
      const currentItems = breadcrumbsApi.getItems();
      const text = String(crumbInput.value || "").trim();
      const label = text || `Step ${currentItems.length + 1}`;
      const id = `crumb-${Date.now()}-${currentItems.length}`;
      breadcrumbsApi.addCrumb({ id, label });
      crumbInput.value = "";
      writeLog("breadcrumbs.add", { id, label, total: breadcrumbsApi.getItems().length });
    });

    crumbInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        crumbAddBtn.click();
      }
    });

    crumbResetBtn.addEventListener("click", () => {
      breadcrumbsApi.reset();
      writeLog("breadcrumbs.reset", { total: breadcrumbsApi.getItems().length });
    });

    const menuItems = [
      { id: "new", label: "New Incident" },
      { id: "assign", label: "Assign Team" },
      { id: "archive", label: "Archive", danger: true },
    ];
    createDropdown(document.getElementById("dropdownBtn"), menuItems, {
      onSelect(item) {
        writeLog("dropdown.select", item);
      },
      onOpenChange(open) {
        writeLog("dropdown.open", { open });
      },
    });

    createDropup(document.getElementById("dropupBtn"), [
      { id: "caller", label: "Caller View" },
      { id: "operator", label: "Operator View" },
      { id: "admin", label: "Admin View" },
    ], {
      onSelect(item) {
        writeLog("dropup.select", item);
      },
      onOpenChange(open) {
        writeLog("dropup.open", { open });
      },
    });
  </script>
</body>
</html>
