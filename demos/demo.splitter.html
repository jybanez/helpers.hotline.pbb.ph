<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splitter Demo</title>
  <link rel='stylesheet' href='../css/demo/demo.shell.css'>
  <style>
    body { margin: 0; padding: 24px; background: #0c1017; color: #d7e0f4; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    .page { max-width: 1100px; margin: 0 auto; display: grid; gap: 14px; }
    .panel { border: 1px solid #263146; border-radius: 10px; background: #111826; padding: 14px; display: grid; gap: 10px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .back { color: #b2c2e5; text-decoration: none; font-size: 13px; }
    #hostHorizontal, #hostVertical { border: 1px solid #2b3750; border-radius: 8px; padding: 10px; background: #0b1220; }
    #hostVertical .ui-splitter { min-height: 340px; }
    .log { margin: 0; white-space: pre-wrap; font-size: 12px; color: #b2c2e5; font-family: Consolas, "Courier New", monospace; border: 1px solid #2b3750; border-radius: 8px; background: #0b1220; padding: 10px; height: 220px; overflow: auto; }
  </style>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    window.__demoLoaderReady = uiLoader.loadMany(["ui.splitter", "ui.dom"]);
  </script>
  <script>
    window.demoMeta = {
      title: "Splitter",
      overview: "Resizable two-pane layout primitive for horizontal or vertical split surfaces.",
      useWhen: [
        "Use <code>createSplitter(...)</code> when two adjacent panes must be resizable by the user.",
        "Use it as layout infrastructure under more specific components."
      ],
      avoidWhen: [
        "Do not use it for static two-column layouts that never resize.",
        "Do not use it as a replacement for a full page shell."
      ],
      description: "The splitter is intentionally narrow: it solves pane resizing and leaves the pane contents to the surrounding app or helper composition.",
      sectionSamples: {
        "horizontal": `createSplitter(host, {\n  orientation: "horizontal",\n  initialSizes: [35, 65],\n});`,
        "vertical": `createSplitter(host, {\n  orientation: "vertical",\n  initialSizes: [50, 50],\n});`
      },
      constructor: [
        { factory: "<code>createSplitter(container, options)</code>", arguments: "container and splitter options", returns: "Splitter instance" }
      ],
      methods: [
        { method: "<code>setSizes(sizes)</code>", arguments: "pane size array", returns: "<code>void</code>" },
        { method: "<code>destroy()</code>", arguments: "none", returns: "<code>void</code>" }
      ]
    };
  </script>
  <script type='module' src='../js/demo/demo.shell.js'></script>
</head>
<body class="demo-shell-sidebar">
  <main class="page" data-theme="dark">
    <section class="panel">
      <div class="row">
        <a class="back" href="./index.html">← Back to Home</a>
        <button id="themeToggle" class="ui-button" type="button">Toggle Theme</button>
      </div>
      <h1 class="ui-title">Splitter Demo</h1>
    </section>
    <section class="panel">
      <h2 class="ui-title">Horizontal</h2>
      <div id="hostHorizontal"></div>
    </section>
    <section class="panel">
      <h2 class="ui-title">Vertical</h2>
      <div id="hostVertical"></div>
    </section>
    <section class="panel">
      <h2 class="ui-title">Event Log</h2>
      <pre id="log" class="log">No events yet.</pre>
    </section>
  </main>
  <script type="module">
    import { uiLoader } from "../js/ui/ui.loader.js";
    await window.__demoLoaderReady;
    const createSplitter = await uiLoader.get("ui.splitter");
    const createElement = await uiLoader.get("ui.dom.createElement");

    const page = document.querySelector("main.page");
    const log = document.getElementById("log");
    function writeLog(label, payload) {
      const line = `[${new Date().toISOString()}] ${label}\n${JSON.stringify(payload ?? {}, null, 2)}\n`;
      log.textContent = log.textContent === "No events yet." ? line : `${line}\n${log.textContent}`;
    }
    function pane(title, body) {
      return createElement("div", {
        html: `<h3 class="ui-title">${title}</h3><p>${body}</p>`,
      });
    }
    createSplitter(document.getElementById("hostHorizontal"), {
      orientation: "horizontal",
      initialRatio: 0.4,
      paneA: pane("Queue", "Active intake queue and caller details."),
      paneB: pane("Map/Dispatch", "Unit location and dispatch map region."),
      onResize(ratio) {
        writeLog("splitter.horizontal.resize", { ratio: Number(ratio.toFixed(3)) });
      },
    });
    createSplitter(document.getElementById("hostVertical"), {
      orientation: "vertical",
      initialRatio: 0.55,
      paneA: pane("Top Pane", "Summary stack"),
      paneB: pane("Bottom Pane", "Detailed timeline"),
      onResize(ratio) {
        writeLog("splitter.vertical.resize", { ratio: Number(ratio.toFixed(3)) });
      },
    });
    document.getElementById("themeToggle").addEventListener("click", () => {
      const next = page.dataset.theme === "dark" ? "light" : "dark";
      page.dataset.theme = next;
      writeLog("theme.toggle", { theme: next });
    });
  </script>
</body>
</html>
